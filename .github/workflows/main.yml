name: Build PS3 PKG

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: zeldin/ps3dev-docker:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          echo "Checking PS3 toolchain..."
          ppu-gcc --version || true
          make --version

      - name: Build
        run: make

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: CustomPlayerPKG
          path: "*.pkg"
